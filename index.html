<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HexGaming 红人评估工具（含平台图标+完整名称版）</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", Arial, sans-serif;
        }
        body {
            max-width: 900px;
            margin: 30px auto;
            padding: 0 20px;
            background: #f5f7fa;
        }
        .container {
            background: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        h1 {
            text-align: center;
            color: #1e293b;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .brand-box {
            background: #eff6ff;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 24px;
            color: #1e293b;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #334155;
        }
        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 14px;
        }
        /* 平台下拉框图标对齐优化 */
        select option {
            padding: 5px 0;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .btn {
            background: #2563eb;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            margin-right: 10px;
        }
        .btn:hover {
            background: #1d4ed8;
        }
        #loading {
            margin-left: 10px;
            color: #666;
            display: none;
        }
        .result-box {
            margin-top: 20px;
            padding: 20px;
            background: #f8fafc;
            border-radius: 8px;
            display: none;
        }
        .result-box h3 {
            color: #1e293b;
            margin-bottom: 15px;
            font-size: 18px;
        }
        .result-content {
            line-height: 1.8;
            color: #334155;
            white-space: pre-wrap;
        }
        .error {
            color: #ef4444;
        }
        .auto-tip {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
        }
        .required-mark {
            color: #ef4444;
            margin-left: 4px;
        }
        /* 平台图标样式统一 */
        .platform-icon {
            margin-right: 8px;
            font-size: 16px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>HexGaming 红人评估工具（含平台图标+完整名称版）</h1>

    <div class="brand-box">
        <strong>品牌信息</strong><br>
        品类：游戏手柄/电竞外设<br>
        受众：18-45岁 PS5/Xbox/PC 主机玩家<br>
        价格：$139–$269｜佣金：5%–10% 阶梯<br>
        需求：测评、对比、开箱、实机演示<br>
        地区：北美 / 欧洲 / 英国 / 日本
    </div>

    <!-- 手动填写3个核心字段（平台显示完整名称+图标） -->
    <div class="form-group">
        <label>1. 平台选择（必填）<span class="required-mark">*</span></label>
        <select id="platform" required>
            <option value="">请选择红人平台</option>
            <option value="IG"><span class="platform-icon">📸</span> Instagram</option>
            <option value="TK"><span class="platform-icon">🎬</span> TikTok</option>
            <option value="YTB"><span class="platform-icon">📺</span> YouTube</option>
        </select>
        <div class="auto-tip">✅ 选择平台，避免账号ID重复（不同平台同ID可清晰区分）</div>
    </div>
    <div class="form-group">
        <label>2. 账号ID（必填）<span class="required-mark">*</span></label>
        <input type="text" id="accountId" placeholder="例如：@ProGamer123">
    </div>
    <div class="form-group">
        <label>3. 粉丝数（必填）<span class="required-mark">*</span></label>
        <input type="text" id="fans" placeholder="例如：1111 Followers / 5.2万粉丝">
    </div>

    <!-- 复制粘贴即可，AI自动识别所有信息 -->
    <div class="form-group">
        <label>4. 简介（直接复制）</label>
        <textarea id="bio" placeholder="粘贴红人简介即可，AI自动识别地区/语言/内容风格"></textarea>
        <div class="auto-tip">✅ AI 自动识别：地区 / 语言 / 内容风格</div>
    </div>
    <div class="form-group">
        <label>5. 近5条视频（标题+播放量）</label>
        <textarea id="videos" placeholder="粘贴视频标题即可，AI自动识别竞品+背调扫雷"></textarea>
        <div class="auto-tip">✅ AI 自动识别：竞品提及 + 历史内容扫雷</div>
    </div>

    <button class="btn" id="analyzeBtn">🚀 一键全自动AI评估</button>
    <span id="loading">AI分析中...（10-30秒）</span>

    <div class="result-box" id="resultBox">
        <h3>AI 全自动评估报告（含平台区分）</h3>
        <div class="result-content" id="resultContent"></div>
    </div>
</div>

<script>
const API_KEY = prompt("请输入你的DeepSeek API密钥（仅本次会话有效）：") || "";
const API_URL = "https://api.deepseek.com/v1/chat/completions";

function getPrompt() {
    const platform = document.getElementById('platform').value;
    const accountId = document.getElementById('accountId').value.trim();
    const fans = document.getElementById('fans').value.trim();
    const bio = document.getElementById('bio').value || '无';
    const videos = document.getElementById('videos').value || '无';

    // 校验必填项（平台+ID+粉丝数）
    if (!platform) return "错误：请选择红人平台！";
    if (!accountId) return "错误：请填写账号ID！";
    if (!fans) return "错误：请填写粉丝数！";

    // 平台完整名称映射（和下拉框一致，带图标，报告中显示更直观）
    const platformFullName = platform === 'IG' ? 'Instagram 📸' : 
                            platform === 'TK' ? 'TikTok 🎬' : 'YouTube 📺';

    // 核心优化：报告中显示完整平台名称+图标，结合平台特性评估
    return `你是HexGaming海外红人专家+风控专家，熟悉Instagram、TikTok、YouTube三大平台特性，只根据提供的信息客观分析，不要编造任何内容。

【品牌背景】
游戏手柄/电竞外设，价格$139-$269，受众18-45岁主机玩家，需求测评/开箱/对比/实机演示，目标地区：北美/欧洲/英国/日本。

【红人基础信息】
平台：${platformFullName}
账号ID：${accountId}
粉丝数：${fans}
简介：${bio}
近5条视频：${videos}

请严格按以下10项输出评估报告，所有带「自动识别」的项必须从上述信息中推导，同时结合对应平台特性（YouTube侧重长视频深度测评、TikTok侧重短平快实机演示、Instagram侧重图文/短视频种草）：
1. 自动识别地区+语言（精准度1-10）
2. 自动识别内容风格（结合平台特性，如YouTube硬核测评、TikTok短平快演示等）
3. 自动识别竞品提及（仅列Scuf/Xbox Elite/Astro/PowerA等手柄竞品，无则写「无」）
4. 自动红人背调+历史内容扫雷（舆情风险/负面言论/违规记录/合作违约风险，风险等级：低/中/高）
5. 粉丝画像匹配度（1-10分，结合平台受众特性说明理由）
6. 内容匹配度（1-10分，结合平台特性说明理由）
7. 互动质量判断（结合平台特性，判断是否有刷量风险，说明依据）
8. 综合评分（0-100分）
9. 最佳合作形式（3种，适配平台特性和内容风格）
10. 建议报价（USD，结合平台和粉丝数）+ 最终合作建议（可合作/谨慎合作/不建议合作）`;
}

async function analyze() {
    const loading = document.getElementById('loading');
    const resultBox = document.getElementById('resultBox');
    const resultContent = document.getElementById('resultContent');

    loading.style.display = 'inline';
    resultBox.style.display = 'none';
    resultContent.innerHTML = '';

    // 先获取提示词（包含必填项校验）
    const prompt = getPrompt();
    if (prompt.startsWith("错误：")) {
        resultContent.innerHTML = `<span class="error">❌ ${prompt}</span>`;
        loading.style.display = 'none';
        resultBox.style.display = 'block';
        return;
    }

    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${API_KEY}`
            },
            body: JSON.stringify({
                model: "deepseek-chat",
                messages: [{ role: "user", content: prompt }],
                temperature: 0.2, // 结果更精准，减少编造
                max_tokens: 2200   // 适配平台相关评估内容，增加token容量
            })
        });

        const data = await res.json();
        if (data.choices?.length) {
            resultContent.innerHTML = data.choices[0].message.content;
        } else if (data.error) {
            resultContent.innerHTML = `<span class="error">❌ API错误：${data.error.message}</span>`;
        }
    } catch (err) {
        resultContent.innerHTML = `<span class="error">❌ 网络错误：${err.message}</span>`;
    } finally {
        loading.style.display = 'none';
        resultBox.style.display = 'block';
    }
}

document.getElementById('analyzeBtn').addEventListener('click', analyze);
</script>
</body>
</html>
